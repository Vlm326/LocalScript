services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - 11434:11434
    entrypoint: ["/bin/sh", "-c"]
    command: |
      ollama serve &
      sleep 10
      ollama pull qwen2.5-coder:7b
      tail -f /dev/null
    restart: unless-stopped

  sandbox-service:
    build:
      context: ./sandbox-service
    container_name: sandbox-service
    ports:
      - "6778:6778"
    privileged: true
    restart: unless-stopped

  llm-service:
    build:
      context: ./llm-service
    container_name: llm-service
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - SANDBOX_SERVICE_URL=http://sandbox-service:6778
    depends_on:
      ollama:
        condition: service_started
      sandbox-service:
        condition: service_started
    restart: unless-stopped

  llm-tui:
    build:
      context: ./llm-tui
    container_name: llm-tui
    stdin_open: true
    tty: true
    depends_on:
      llm-service:
        condition: service_started
    restart: "no"
volumes:
  ollama_data:

  