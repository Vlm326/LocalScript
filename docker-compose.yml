services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    command: >
      sh -c '
        ollama serve &
        OLLAMA_PID=$$!
        echo "Waiting for Ollama..."
        until curl -s http://localhost:11434 > /dev/null; do sleep 2; done
        echo "Pulling qwen2.5-coder:7b..."
        ollama pull qwen2.5-coder:7b
        echo "Model ready"
        wait $$OLLAMA_PID
      '
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:11434 || wget --spider -q http://localhost:11434"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  sandbox-service:
    build:
      context: ./sandbox-service
    container_name: sandbox-service
    ports:
      - "6778:6778"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:6778/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  llm-service:
    build:
      context: ./llm-service
    container_name: llm-service
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_URL=ollama:11434
      - SANDBOX_SERVICE_URL=http://sandbox-service:6778
    depends_on:
      ollama:
        condition: service_healthy
      sandbox-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ollama_data: