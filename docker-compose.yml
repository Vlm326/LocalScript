version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    command: ["serve"]
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    volumes:
      - ollama_data:/root/.ollama
    command: |
      echo "Sleeping before pull..."
      sleep 10

      echo "Pulling model qwen2.5-coder:7b..."
      ollama pull qwen2.5-coder:7b || true

      echo "Model ready"
    restart: "no"

  sandbox-service:
    build:
      context: ./sandbox-service
    container_name: sandbox-service
    ports:
      - "6778:6778"
    privileged: true 
    restart: unless-stopped

  llm-service:
    build:
      context: ./llm-service
    container_name: llm-service
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_URL=ollama:11434
      - SANDBOX_SERVICE_URL=http://sandbox-service:6778
    depends_on:
      - ollama
      - sandbox-service
      - ollama-init
    restart: unless-stopped

  llm-tui:
    build:
      context: ./llm-tui
    container_name: llm-tui
    environment:
      - LLM_SERVICE_URL=http://llm-service:8080
    depends_on:
      - llm-service
    stdin_open: true
    tty: true
    restart: "no"

volumes:
  ollama_data: